body:
  text: 抱一子解周易參同契敘若一夫物之成乎形象者久則必毁而乾坤不毁物之聚乎精華者久則必散而日月不散物之麗乎木火土水者其質終壞而真金不壞物之屬乎砂石草木者其性可死而真丹不死然則乾坤也日月也真金也真丹也皆物之至神者爾是以仙家金丹之號非苟而取故金丹者象乾坤以爲體法日月以爲用乾坤吾身之天地也坎離吾身之日月也乾坤升降則有候坎離配合則有機至寳鍊成一得永得此其所以不毁不散不壞不死歟大矣哉金丹之道包空括壤越數超形非其他妙法三千六百門所可望洋也先聖欽重道寳懼泄非人每以心傳不形竹素後漢魏伯陽悼大道之幾鬱憫志士之無師始以所得古文金碧龍虎經假象託趣演而伸之紓發丹祕曉諸未悟目曰周易參同契其辭古意深人病難讀徐從事張隨彭真一皆嘗傳註今所見惟彭耳然文義雖詳而真機尚隱近時俗解類以旁門附會視彭益舛貽誤後學不足觀矣抱一先生陳君天禀夙穎洞明性宗嘉定癸未遇至人于淮之都梁盡得金丹真㫖寳慶初來輦下以慈濟心接挽後輩始得參同契讀之迎刃無留疑已而盡謝朋從入室修鍊者餘年功益深而道益著於是以其親履實詣者筆諸訓解言入微而義釋辭不費而理彰猶蔡墨之辯神龍和氏之指眞玉丹道有所恃賴矣昔伊川程子謂世有至難者三事爲國而至於祈天永命養形而至於長生學而至於聖人三者其功則一皆可以奪造化今先生之道非但養形而已也後學能熟味此篇深求而自得之然後知先生之所謂道有非言語文字之所能及者矣易曰神而明之存乎其人僕洗耳先生造極之論殊久且預聞著述之意於是乎書先生名顯微字宗道後隱以微名維揚人也號抱一子有立聖篇及顯微卮言并抱一子書傳行于世云有宋端平改元夏五月朔旦金華洞元天璧壺道人鄭伯謙拜手謹敘
