body:
  text: 抱一子陳顯微解上篇乾坤者易之門户衆卦之父母金碧經曰神室者丹之樞紐衆石之父母魏君謂乾坤者易之門户衆卦之父母其義一也非神室則無以成丹非乾坤則無以見易乾坤純體之卦也六子破純體而爲卦也麻衣曰乾坤錯襍乃生六子六子即是乾坤破體是則六子因乾坤而生而六十四卦亦莫不出於乾坤故曰衆卦之父母父母之體本是純陽純陰自六子之生而純陽純陰之體破矣鳥可復純乎陳希夷曰破體鍊之純體乃成是知破體鍊之可返純體而入道衆石鍊之可歸神室而成丹然而衆石非外物吾身中之衆卦也神室亦非外物也吾身中之乾坤也欲鍊大丹先設乾坤爲神室神室旣設而變化在乎其中矣坎離圍郭運轂正輻乾坤旣奠陰陽自交乾下交坤而爲坎坤上交乾而爲離坎離成而變化又在乎其中矣陳希夷曰日爲天炁自西而下以交於地月爲地炁自東而上以交於天男女交精之象也日月徃來寒暑生焉四時成焉晝夜分焉陰陽定焉天地不能寒暑也以日月遠近而爲寒暑天地不能四時也以日月南北而爲四時天地不能晝夜也以日月出没而爲晝夜天地不能晦明也以日月交會而爲晦明陰陽雖妙不外乎日月造化雖大不外乎坎離是故衆卦之變雖不齊而不出坎離之中爻周流乎六位也猶車輻之設雖不一而不出乎一轂之運居其中也坎離中爻謂坎中之一離中之一上下徃來六爻之内老子三十輻共一轂當其無有車之用達者得其道而運身中之日月常人昩其理而違造化之陰陽則未免有覆隍之虞脱輻之咎其於圍郭正轂果何有哉牝牡四卦以爲橐籥覆冒陰陽之道猶工御者準䋲墨執銜轡正規矩隨軌轍處中以制外乾者純陽牡卦也坤者純陰牝卦也坎者陰中有陽離者陽中有陰牝牡相交之卦也故謂之牝牡四卦其他六十卦或偏陰在上或偏陽在下或偏陽在上或偏陰在下陰陽不純牝牡不交不可謂之牝牡惟此四卦覆冒陰陽之道以爲橐籥乾坤者橐籥之體坎離者橐籥之用知四卦體用則猶工者準绳墨而就䂓矩御者執衘轡而循軌轍處其理於中制其妙於外庶幾舉無差忒動合自然也數在律曆紀月節有五六經緯奉日使兼并六十四剛柔有表裏律曆之中一月三十日而牝牡四卦之餘適有六十卦以卦奉日一日兩卦一卦爲經一卦爲緯朝屯暮蒙朝需暮訟以至旣濟未濟而卦象内外剛柔之體朝在上則暮在下剛在表則柔在裏并兼前四卦則周易六十四卦皆爲吾用是則大丹之道可以參諸易而參同契之所以作也朔旦屯直事至暮蒙當受晝夜各一卦用之依次序旣未至晦爽終則復更始日辰爲期度動靜有早晚麻衣曰消息畫象無止於辭辭外見意方審易道又曰卦有反對最爲關鍵反體既深對體尤妙屯卦也反之爲蒙卦也自需訟以下皆以倒體爲次如頥小過之類不可反者則以對體次之故頥卦則以大過卦次之此對體也自朔旦用屯蒙至晦爽用旣未晦爽循環終而復始可見朝陰則暮陽晝動則夜靜親踈迴互主客遞分消息盈虚避就生殺進火忌斯須之謬退符防毫髮之差抽添須辨浮沉運用審之昏曉學者因象而求意得意而忘象可也悟真篇詩云此中得意休求象若究群爻謾役情春夏據内體從子到辰巳秋冬當外用自午訖戌亥卦有内外二體内卦三爻法一年之春夏一日之子後午前外卦三爻法一歲之秋冬一日之午後子前内卦法陽外卦法陰乾坤交泰之象春夏養陽秋冬養陰子後進火午後退符其理一致賞罰應春秋昏明順寒暑爻辭有仁義隨時發喜怒如是應四時五行得其理賞爲陽罰爲陰仁爲陽義爲陰喜爲陽怒爲陰朝則行陽以應春夏暮則行陰以應秋冬苟能應四時之宜自然得五行之理非區區行賞行罰汲汲爲義爲仁與夫作喜作怒也魏君假是以喻陰陽生殺云爾況丹者至陽之精倘有纖毫陰炁煆煉未盡終未成就修真之士動靜語默之間可不謹歟至如好生利物仁慈寬恕惠愛忠信和喜清靜真實不妄之類皆陽也好殺害物殘忍嫉忿貪慳凌侮驕傲狠愎淫慾虚詐不實之類皆陰也戒陰修陽陰將自亡陰盡陽純自然成真天地設位而易行乎其中矣天地者乾坤之象也設位者列陰陽配合之位也易爲坎離坎離者乾坤二用二用無爻位周流行六虚徃來旣不定上下亦無常幽潜淪匿變化於中包囊萬物爲道紀綱此叚魏君自解以乾坤爲神室列陰陽配合之位使坎離交於其中以成變化之功易謂坎離者日月爲易也日月乃天地之易坎離即人身中之易乾坤其體也坎離其用也二用無爻位周流行六虚徃來不定上下無常幽潜莫測淪匿難尋而變化於中生成至寳猶陰陽交感化生萬物而爲道之紀綱也以無制有器用者空故推消息坎離没亡金碧經曰有無相制朱雀炎空紫華曜日砂汞没亡魏君之言盖發明金碧經之㫖也其㫖盖以性火真空制命水至寳火體本空遇物而現而虚明無我者皆火德也及乎運火於太虚鼎器之中使彌天紫焰徧界紅光金宫玉闕變現千端神獸靈龍飛騰萬狀此鉛汞也亦坎離也固非無也然作用旣已果安在哉故云故推消息坎離没亡言不苟造論不虚生引驗見効校度神明推類結字原理爲證坎戊月精離己日光日月爲易剛柔相當土旺四季羅絡始終青赤白黑各居一方皆禀中宫戊己之功易卦納甲法坎納六戊離納六己坎爲月離爲日故曰坎戊月精離己日光日月二字合爲易字故曰推類結字是皆原理爲證而非虚造言論也易旣不外乎日月丹豈不本乎坎離然坎之與離皆存戊己古人云都縁彼此懷真土遂使金丹有返還況土旺四季羅絡始終水火木金雖各居一方而皆禀中宫土德張紫陽詩云四象五行全藉土土德之功大矣哉土者金母也知五行之俱歸於土則知五行之俱變爲金然後能會造化於中宫種黄芽於后土矣易者象也懸象著明莫大乎日月窮神以知化陽往則陰來輻凑而輪轉出入更卷舒金碧經曰丹術著明莫大乎金火窮微以任化陽動則陰消魏君以易繫辭參之然大易之道垂象於日月大丹之道著明於金火金火即坎離也故金精盛則玉兔增輝火德旺而金烏倍烈學者旣窮其神而知其化使陽往而陰來輻凑而輪轉遞互岀入相爲卷舒取大易爻象而爲節符視日月昏明而行火候自然奪天地之機盜造化之妙矣易有三百八十四爻據爻摘符符謂六十四卦晦至朔旦震來受符當斯之時天地搆其精日月相撢持雄陽播玄施雌陰統黄化混沌相交接權輿樹根基經營養鄞鄂凝神以成驅衆夫蹈以出蝡動莫不由易有三百八十四爻藥有三百八十四銖二十四銖爲一兩三百八十四銖爲十六兩即二八之數據爻象陰陽升降之理摘卦爲符而視符行火符即爻畫非别有符也據易言之謂之卦據丹言之謂之符故曰符謂六十四卦也卦當陽生之震則火進一陽之符當斯之時神室鍊其精金火相運推雄陽龍也雌陰虎也播玄施者龍騰玄天而降雨也統黄化者虎入后土而産金也上天入地混沌交接之象也於是權輿而立其根基經營而養其鄞鄂其神旣凝其軀自成凡大而天地細而蝡動有形有氣者莫不由是而出惟産此一㸃於外乃降本流末爲生生不窮之道産此一㸃於内乃返本還元長生超脱之道也於是仲尼讃鴻濛乾坤德洞虚稽古當元皇關雎建始初冠昏炁相紐元年乃生形炁未具曰鴻濛具而未離曰渾淪易曰易有太極是生兩儀易猶鴻濛也太極猶渾淪也乾坤者太極之變也合之爲太極分之爲乾坤故合乾坤而言之謂之渾淪分乾坤而言之謂之天地仲尼讃易首陳乾坤爲易之門户以乾坤洞虚之德而藴鴻濛之易也關雎之詩冠昏之義取二炁相紐而言也乾坤未分則謂之渾淪陰陽相紐則謂之始初列子曰太初炁之始也太始形之始也故曰關雎建始初金丹也者太乙元君取乾坤未分陰陽未離之炁化爲真汞鍊作真丹故曰先天一炁混元至精又曰有物混成先天地生金碧經曰元君始鍊汞神室含洞虚玄白生金公巍巍建始初其㫖在此元年者首年也修鍊之初首初一年滋生黄芽金丹成矣學者當觀時節因縁下手用功採取至寳以結丹頭丹頭旣得自然默會天機而立超聖地世人迷昩不曉天機妄以私意測度或錯認邪蹊或誤求外物又豈知神靈至寳生於虚無者邪盖乾坤未分陰陽未判自有其時也學道之士切在至誠專心歸向道真一旦逢師授之口訣或熟讀是書豁然契悟則自能曉悟其時方能採至寳於虚無取靈物於恍惚或問曰虚無恍惚之中豈有物耶答曰豈不見陽燧取火方諸取水其火其水憑虚而生但人未知虚空之中自有天然神通妙用視之不見聽之不聞摶之不得者耳聖人不虚生上觀顯天符天符有進退屈伸以應時故易統天心顯天符者日月也日月有進退屈伸與易卦陰陽升降往來代謝之理相應故知易統天心而作易聖人大功大德於天下豈虚生也哉復卦建始萌長子繼父體因母立兆基消息應鍾律升降據斗樞三日出爲爽震受庚西方八日兌受丁上弦平如繩十五乾體就盛滿甲東方蟾蜍與兔魄日月氣雙明蟾蜍視卦節兔魄吐精光七八道已訖屈折低下降十六轉受統巽辛見平明艮直於丙南下弦二十三坤乙三十日東北喪其朋節盡相禪與繼體復生龍大道形于造化而造化至難窺測也苟能窺造化而測其機則能探道妙而盜其用非真仙上聖疇克爾哉古之聖真仁天下之心不可思議也旣測造化之機而利諸已復明造化之妙而利諸人在己者固可以心知意會而示人者非假象托文將何以發明使人默而識之乎於是仰觀俯察於天地之間而顯造化之妙用者莫大乎日月旁求於經書之中而載造化之妙理者莫出於易卦而又將日月徃來盈虧之迹校易卦爻畫變動之理莫不相參而一致是則參同契之所由作也謂參大易之理同造化之妙契大丹之道也今觀乎一陽初生其卦爲復震下坤上震爲長男坤爲母乾爲父復卦本是純坤一陽自乾來變下爲震故曰因母立兆基震具乾體而微然積漸二陽以至三陽則乾體成矣故曰長子繼父體應鍾律者一月增一爻也據斗樞者一時進一爻也月初三日月現微明於西方庚位應震之一陽初生而周易納甲法震卦納六庚其造化之理參合如此初八日月現上弦於南方丁位應兊卦二陽生而納甲法則兊納六丁以至十五日月滿於東方甲位則乾卦又納六甲其時卦備三陽兔蟾俱盛蟾蜍本金氣之精故視卦節而漸旺玉兔乃卯木之魄故望太陽而吐光七八者十五也三五之道已終則滿者虧而伸者屈高者低而升者降至十六日一陰生而當陰用事月於平旦現在西方辛位以應巽卦納辛至二十三日於平旦現在南方丙位應艮卦納丙至三十日月没東方乙位應坤卦納乙節盡則又相禪與陽復用事繼體生龍龍者震也八卦之中獨坎離二卦不與者徃來升降於六卦即坎離之二用也坎離之用大矣哉壬癸配甲乙乾坤括始終七八數十五九六亦相應四者合三十陽氣索滅蔵八卦布列曜運移不失中乾納六甲六壬坤納六乙六癸八卦之中惟乾坤納二榦餘卦只納一榦故曰壬癸配甲乙乾坤括始終以顯乾坤之中皆有真水也少陽數七少陰數八合之得十五老陽數九老陰數六合之得十五四者合之得三十應一月之數七八九六者四象也大易之理與造化之理莫不一致也至三十日月没之際陽氣索然滅蔵過是則一陽又復宛轉循環終而復始運移不失其中則準造化而無差應卦爻而不忒矣元精眇難睹推度効符證居則觀其象準擬其形容立表以爲範占候定吉凶發號順節令勿失爻動時上察河圖文下序地形流中稽於人心參合考三才動則依卦變靜則循彖辭乾坤用施行天地然後理可得不慎乎元精者至靈至神之至寳也生於虚无无形象之可睹隱於眇忽无蹤跡之可求將欲採之必洞曉陰陽深達造化推其符證效其法度居則觀象而準擬其形容動則立表以占候其吉凶上察天文下觀潮候中稽人心更須循卦節而行陽則動勿失爻象變動之時體彖辭而行陰則靜不失至柔含光之理如是則乾坤之用在我施行而靈神之精可得而採取矣況八風調則甘露降陰陽泰則醴泉生是皆天地治也和則致祥乖則致厲可得不謹歟御政之首管括微密開舒布寳要道魁柄統化綱紐爻象内動吉凶外起五緯錯順應時感動四七乖戾誃離俯仰用功之初猶御政之首須當遏絶凶淫屏去嗜慾管括元氣使微密堅固無走泄之虞自然布寳於金胎生神於玉室苟毫髮差殊則如政事錯謬應時感動天變乖離其要在乎運火候於精微體斗杓之運轉爻象内動吉凶外興五緯或差列宿隨戾矣文昌統録詰責台輔百官有司各典所部丹居神室猶人君之立國而人君之立國盖取於天象有三台公輔之位有文昌統録之司台輔之職則坐而論道調燮陰陽使百官各任其職故詰責在台輔也統録之司則揆量人材黜陟賢否使百官各盡其能故統録在文昌也百官有司各稱其職則民物安妥而天下太平衆卦火符不失其度則萬化流通而聖胎增長然治國者在一人之所招修丹者在一心之所感而已日合五行精月受六律紀五六三十度度竟復更始原始要終存亡之緒或君驕溢亢滿違道或臣邪佞行不順軌弦望盈縮乖變凶咎執法刺譏詰過貽主此叚五六以明水土之用也土數五日之數五而五行之數亦五也水數六月之數六而六律之數亦六也自甲至癸十榦謂之十日而五榦剛五榦柔此日之數五也月律十二而六律六吕此月之數六也五其六而爲三十度度竟復更始者晦朔循環也金火二物互相存亡於晦朔之間或君驕溢亢滿違道者土數多而分兩違也或臣邪佞行不順軌者水銖不定也分兩盈縮則乖變凶咎不當責火過在土也金碧經曰非火之咎譴責于土盖謂此也辰極受正優游任下明堂布政國無害道内以養己安靜虚无原本隱明内照形軀閉塞其兊築固靈株三光陸沉温養子珠視之不見近而易求丹居神室猶北辰在上以正衆星人君布政以臨萬國中正而不動則森羅順共端拱而無爲則天下和平是則爲政法天而丹法爲政也則當隱蔵其明回光内照無爲靜默固蒂深根日月與萬象俱沈使光輝之不露嬰子共玄珠增長本温養之無虧無爲功裏見神功非有相中生實相視之不可見聽之那得聞然近而易求非從外得在學者陰功善行如何耳黄中漸通理潤澤達肌膚初正則中美榦立末可持黄者中宫之色丹者中宫之寳周易坤卦六五文言曰君子黄中通理正位居體美在其中暢於四肢發於事業美之至也而況身有大丹懷蔵至寳則其精神異常肌膚潤澤可知矣大抵欲爲神仙先爲君子德行或慊於君子則人道猶未充況仙道乎故魏君取易居中履正之辭以發明有中形外之理使上根之士聞之則積行累功而登仙中士聞之亦不失爲善人君子一者以掩蔽世人莫知之經曰了得一萬事畢而一妙理豈易知之者耶苟知是一而後可以得是一如是之一真一之一也非數之一也真一之一自道而生而數之一則天一生水之一也知一自道生則大丹之道無餘藴矣故曰一者以掩蔽但世人莫能知之耳上德無爲不以察求下德爲之其用不休上閉則稱有下閉則稱無無者以奉上上有神德居此兩孔穴法金氣亦相須天道下濟而光明地道卑而上行坤道上行而其體本靜靜則無爲而不可以察求乾道下濟而其體常動動則有爲而自强不息上閉稱有者坤道上行閉之則有水而水有形下閉稱無者乾道下濟閉之則有火而火無迹無者以奉上者乾可以索坤而上行也上有神德居者坤則含真一之寳也乾下濟則能生坤之氣坤上行則能生乾之金其要在乾坤二竅互相爲用上下交泰則金多而氣自生氣多而金自盛是則金之與氣實相須此乾坤二妙用也知白守黑神明自來白者金精黑者水基水者道樞其數名一陰陽之始玄含黄芽五金之主北方河車故鉛外黑内懷金華被褐懷玉外爲狂夫白者銀也黑者鉛也知白守黑謂鍊銀於鉛也鍊銀於鉛則神明自生銀爲金之精鉛爲水之基五行之中惟獨水之數一合道之樞而爲陰陽之始也雖非眞一之一而得真一之用故真一之道先取金子爲黄芽之根金子即水也欲合萬殊而爲一必先於萬殊之中求其一者而爲基也此金丹之法有取於用鉛者其理如此所以謂水爲道樞也論至於此始明水得真一之用而未是真一之一也水之生數一水之成數六以成數六言之則水一含土五也故鉛外黑内含金華而有玄含黄芽之妙用焉水者五行之始鉛者五金之主水本居北搬運而南使水自下升載寳而上如河車之運故曰河車以黄襍黑故曰被褐謂鉛質本賤也而白銀在内故曰懷玉謂至寳冥蔵也大抵造化之理莫不以賤護貴以晦養明以卑保尊以狂養聖雖外視狂夫而内懷至寳可見機緘不露良賈深蔵豈可與急急於人知者同日而語魏君之㫖雖本在鉛而義亦兩及之金爲水母母隱子胎水者金子子蔵母胞真人至妙若有若無髣髴大淵乍沉乍浮進退分布各守境隅銀是金鉛是水金生水故金爲水母水者金子鉛蔵銀故母隱子胎子蔵母胞金胎處鉛中即是真人在淵内或現或隱乍沉乍浮及乎用鉛旣已水退淵澄真人出現則又各守境隅矣金碧經曰灰池炎灼鉛沉銀浮其㫖同此採之類白造之則朱鍊爲表衛白裏貞居方圓徑寸混而相拘先天地生巍巍尊高採之類白者採浮銀至寳於西方造之則朱者結金丹聖胎於南室丹成顯象如混沌雞子白裏貞居方圓徑寸混而相拘此魏君顯示先天之法象也旣生於天地之先其巍巍尊高豈可思議旁有垣闕狀似蓬壺環帀關閉四通踟蹰守禦固密閼絶姦邪曲閣相通以戒不虞可以無思難以愁勞神炁滿室莫之能留守之者昌失之者亡動靜休息常與人俱神室之中法象旣圓世界成立金輪在外如墻闕之周遮世界居中同蓬壼之美麗銀山鐵壁之堅密則使閼絶姦邪以無虞瓊樓玉閣之四通則可游戲神通而無礙當是時也可以無思難以愁勞保護太和如持滿器一念動止則法身隨焉神炁充身至難保護守之則昌失之則亡學者勉之哉是非歷蔵法内視有所思履斗步罡宿六甲次日辰陰道厭九一濁亂弄元胞食炁鳴腸胃吐正吸外邪晝夜不卧寐晦朔未嘗休身體日疲倦恍惚狀若癡百脉鼎沸馳不得清澄居累土立壇宇朝暮敬祭祠鬼物見形象夢寐感慨之心歡而意悦自謂必延期遽以天命死腐露其形骸舉措輙有違悖逆失樞機諸術甚衆多千條有萬餘前却違黄老曲折戾九都世間法術不可勝計雖歷蔵諸法在學者明辨邪正審察是非而已如閉目内視而思五臟之精光步斗而行以取天罡之正炁按日辰而祭甲厭九一以行陰吐正炁而吸邪濁元胞而服炁晝夜不臥晦朔無休身體日疲精神恍惚或立壇而祠鬼或感夢以祈神諸術雖多皆非正法將期延壽反更夭亡腐臰形骸枉傷天命誠可悲嘆又豈知金液還丹並與父母肉身變化而飛騰者哉如前所述諸法皆違背黄帝老君之道觀其舉措反獲戾於九都之府矣明者省厥㫖矌然知所由勤而行之夙夜不休服食三載輕舉遠遊跨火不焦入水不濡能存能亡長樂無憂道成德就潜伏伺時太乙乃召移居中洲功成上昇膺籙受圖世之明者省魏君所述之㫖知所以修鍊之由勤而行之夙夜無替不踰三年丹道成就便可出水入火輕舉遠遊變化靈通消遥自在然道成德就須當潜伏人間積功累行以待太乙元君之召然後移居中洲膺圖受籙功滿上升身歸紫府所謂功滿三千大羅爲仙功滿八百大羅爲客在功行之高下云耳火記不虚作演易以明之偃月法鼎爐白虎爲熬樞汞日爲流珠青龍與之俱舉東以合西魂魄自相拘上弦兌數八下弦艮亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾銖有三百八十四亦應卦爻之數古有丹書述火候功用謂之火記凡六百篇其㫖不外乎周易然火記之作豈虚而無據耶當演易以明之可也易有三百八十四爻即周天火候上下二弦二八一斤之數一斤計三百八十四銖適與卦爻相應乾爻一百九十二坤爻一百九十二而乾坤之道備矣偃月爐者謂玄關一竅之體用也其竅半黑半白如半弦月故曰偃月爐知偃月爲爐鼎則大丹之道思過半矣白虎在下爲發火之樞機青龍居上起騰雲之風浪其間真汞變化流珠是則東龍與西虎相交陰魄與陽魂相制運神功於金鼎煆聖藥於玉爐倒造化之機翻乾坤之用非天下之至通其孰克知此哉金入於猛火色不奪精光自開闢以來日月不虧明金不失其重日月形如常金本從月生朔旦受日符金返歸其母月晦日相包隱蔵其匡郭沉淪於洞虚金復其故性威光鼎乃熹日月與金最爲長久自開天闢地以來日月之形如常而未嘗虧明真金之重如初而未嘗奪色盖三者一體也人徒見金精盛而月倍明以知金自月生而不知月之明本生於日也故會合之際月蔵其明沉淪同虚以受日化乃能生金而金性本出於日故其堅剛重實禀太陽之色具太陽之性也萬物遇火莫不銷壞惟金入火色不奪光經百鍊而愈堅度大冶而益赤盖火乃太陽之氣金乃太陽之精金入猛火乃復其故性是以鼎爐火熾則金色愈增而威光熹然可愛矣子午數合三戊己數稱五三五旣和諧八石正綱紀呼吸相含育佇恩爲夫婦黄土金之父流珠水之母水以土爲鬼土鎮水不起朱雀爲火精執平調勝負水盛火消滅俱死歸厚土三性旣會合本性共宗祖八石外藥也以三五譬之子水一午火二子午之數合而成三也土數五故戊己稱五也三五和諧水火土三者合會也三五相爲夫婦互作君臣如八石之互相制度也土生金故土爲金父土剋水故土爲水鬼流珠汞也生於日而結爲金金生水故流珠爲水母以水沃之則火不炎以土鎮之則水不濫是則三物一家都歸戊己也水得土則消火得土則息金得土乃歸其父也土爲金父則火爲金祖故曰三性會合則本性共宗祖也巨勝尚延年還丹可入口金性不敗朽故爲萬物寳術士服食之壽命得長久土遊於四季守界定䂓矩金砂入五内霧散若風雨薰蒸達四肢顔色悦澤好髮白皆變黑齒落生舊所老翁復丁壯耆嫗成姹女改形免世厄號之曰真人胡麻又名巨勝此凡藥也服之尚可延年況神丹乃純陽之精其性如金剛之不壞而金在萬物之中爲至貴之寳苟得服之壽命長久豈不萬倍於凡藥乎辰戌丑未四方皆有土可見金木水火皆資土而立而五臟之數五雖禀金木水火其實亦資土五而榮也金者土之子真丹入腹而金氣入於五臟之内則溟濛煙霧徧體薰烝如陶冶之中火正熾時而上水下施如煙如霧其時四肢百脉淫淫春澤熏熏流布自然回顔换骨返老還嬰顔色光鮮精神悦澤髮白返黑齒落更生老翁變作壯年耆嫗翻成姹女形體改换世厄自逃晝夜清明神識不寐法身與幻質皆充陰魄與陽神俱妙方可謂之真人矣當是時雖混塵凡而不同三界雖居濁世莫測行蔵欲去則直造蓬洲放意則俓超象外矣胡粉投火中色壞還爲鉛氷雪得温湯解釋成太玄金以砂爲主禀和於水銀變化由其真終始自相因欲作服食仙宜以同類者植禾當以黍覆雞用其子以類輔自然物成易陶冶魚目豈爲珠蓬蒿不成檟類同者相從事乖不成寳是以燕雀不生鳳狐兔不乳馬水流不炎上火動不潤下物類相感有不期然而自不容不然者胡粉本鉛燒就而再投火中則其色變壞復化爲鉛氷雪本水結再得火炁則復化爲水至寳之生本出乎太陽真精結靈聚秀初結成硃砂則其中已有真汞真汞離母則曰水銀水銀在大冶之中爲太陽所鍊歲久凝爲白銀白銀歷久始變黄金則是金本以砂爲主砂者神也故曰神砂汞者精也故曰水銀今者鍊丹之初先採陽精變化爲砂次取水銀與砂相合研和二物煆鍊成金旣已成金方用鉛養盖真精生化出乎太陽本與太陰交合而生須得真鉛始堪服食真鉛生於太陰故曰同類金得真鉛如子得母以此相輔陶冶易成譬以黍種禾以雞抱卵同禀相感同氣相須也苟不知此别求異類則徒勞心力枉費工夫猶燕雀不能生鳳狐兔不能乳馬水不可以蒸物火不可以潤物也知此理則砂汞合而精神生水火交而蒸潤得則是火居水下而可以遂炎上之功水居火上而可以成潤下之德非天下至精其孰與於此哉世間多學士高妙負良材邂逅不遭遇耗火亡貨財據按依文說妄以意爲之端緒無因縁度量失操持搗治羗石膽雲母及礬磁硫黄燒豫章泥澒相鍊持皷下五石銅以之爲輔樞襍姓不同種安肯合體居千舉必萬敗欲黠反成癡僥倖迄不遇聖人獨知之稺年至白首中道生狐疑背道守迷路出正入邪岐管窺不廣見難以揆方來金丹之理妙奪造化迥出思議之表不遇至人徒勞測度若用外物尤其狂妄守邪背正又非賢材徃徃學道之人不肯堅心尋師訪友苦志勤求或有始無終或狐疑中道蹉跎白首衰老無成是皆管窺天自高自滿者之過也然明明日月蕩蕩乾坤寒暑徃來朝昏相代無非大道方來之理不遇至人難以揆度學者冝先積行累功以祈感遇切勿自欺寳山空手歸去若夫至聖不過伏羲始畫八卦效法天地文王帝之宗結體演爻辭夫子庶聖雄十翼以輔之三君天所挺迭興更御時優劣有步驟功德不相殊制作有所踵推度審分銖有形易忖量無兆難慮謀作事令可法爲世定詩書素無前識資因師覺悟之皓若褰帷帳瞋目登高臺魏君天資挺拔猶且因師覺悟故嘆金丹妙理非有形有兆實難忖難量雖三聖寓是理於易經而八卦叅玄機於造化象指旣形之妙言彰可兆之功揆之叅同猶存世法雖聖人審分銖而制作使學者探𧷤隱而推求奈何指祕辭心道超象外參同不作㝠昩奚明此魏君所以準窮理盡性之書述超凡入聖之道如執左契似褰前帷本出師資非干前識是知天機雖遠而人人有分大道不隱而世世得人勿謂宿有仙骨方可希求當知但辦肯心無不可者翻覆魏君前後謙辭始知前真慈悲之㫖火記六百篇所趣等不殊文字鄭重說世人不熟思尋度其源流幽明本共居切爲賢者談曷敢輕爲書若遂結舌瘖絶道獲罪誅冩情著竹帛又恐泄天符猶豫增嘆息俛仰綴斯慮陶冶有法度未忍悉陳敷略述其紀綱枝條見扶踈世之學者見丹經紫書火候之說述進退文武之功有始終起止之異不狐疑者鮮矣所以諸經多云有六百篇以載火候功用殊不知言殊㫖一體異用同旣識朝屯暮蒙之反覆則知晝姤夜復之循環如轉璇璣如循軌轍雖文辭之鄭重實囑付之勤渠故彰六百篇以周三百日不出乎進退兩卦但在夫始終一誠心志精專絲毫不忒嘆夫聖言不隱世不熟思故魏君復敘三篇無非一理盖欲調析紀綱陳敷法度使後學易明厥量大哉以金爲隄防水入乃優游金計有十五水數亦如之臨爐定銖兩五分水有餘二者以爲真金重如本初其三遂不入火二與之俱三物相含受變化狀若神下有太陽炁伏蒸須臾間先液而後凝號曰黄輿焉歲月將欲訖毁性傷壽年形體爲灰土狀若明牎塵欲鍊大丹先以純金修築城郭周遭圍遶然後取真水於其中始無滲漏或謂金隄或言城郭皆此意也欲築金隄但知四象五行全藉土之理則金自然成矣會用五行真土能成五行真金盖土者金母也旣成五行真金則能櫃五行真水盖水者金子也水土金三物紐結成方寸之形而嬰兒現象於其間矣及夫運用上昇則金光滿室騰騰若車輿之行故號黄輿也但臨爐定則金重不過五分放水多些少不妨其三不入火二與俱者木三火二也火二與木三俱不入如人之魂神本自無體寓物而現修真之功但鍊水土金三物三物旣結就而成寳則魂神自然與之俱妙矣水入金防本是凝液借太陽在下之氣伏蒸煆鍊變化成輿火力旣周神功旣足則千變萬化鳳輦龍車皆是物也及乎脱胎則形體閃爍如明䆫日影射塵之狀此魏君顯露功成變化之象奈何世人不知妄行忖測曾未夢見敢肆臆說惟親詣者能知之耳擣治并合之馳入赤色門固塞其際會務令致完堅炎火張於下晝夜聲正勤始文使可修終竟武乃陳候視加勤慎審察調寒温周旋十二節節盡更相親氣索命將絶休死亡魄魂色轉更爲紫赫然成還丹提粉以一元刀圭最爲神此言運用之功動天地之橐籥如擣而治之直至南方赤門方固閉而使水火際會此功晝夜不絶先以文升次以武降周旋十二時一日旣終更宜勉强至於氣已索然命將垂絶百脉歸根萬竅歸寂非死也絶後重甦金光轉紫狀如紫粉一刀圭許時時呈露處處現前變化不測神妙不可思議矣推演五行數較約而不煩舉水以激火奄然滅光明日月相激薄常在晦朔間水盛坎侵陽火衰離晝昏陰陽相飲食交感道自然若以五行較之火見水則奄然滅光然日月亦水火也每遇合朔而不相傷何也盖天地陰陽交感相食自有定數定期無水盛火衰之害能察其機而盗用之則宇宙在手萬化在身雖水火之相剋而合爲夫婦金木之間隔而自然交通然天下莫不見而莫能知也悲夫名者以定情字者縁性言金來歸性初乃得稱還丹吾不敢虚說倣傚聖人文古記題龍虎黄帝美金花淮南鍊秋石王陽加黄芽賢者能行持不肖母與俱古今道由一對談吐所謀學者加勉力留念深思惟至要言甚露昭昭不我欺此言還丹之所以稱還丹也還者以情言丹者以性言金來歸性初者言金公本我所生今使之復見其母還歸本初與姹女相合結成嬰兒故曰還丹紫陽詩曰金公本是東家子送在西鄰寄體生認得唤來歸舍養配將姹女結親情是也古今名稱雖不同其實一道也周易參同契解卷上
