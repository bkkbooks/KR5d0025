body:
  text: 抱一子陳顯微解中篇乾剛坤柔配合相包陽禀陰受雄雌相須須以造化精氣乃舒坎離冠首光耀垂敷玄冥難測不可畫圖聖人揆度參序元基四者混沌俓入虚無六十卦周張布爲輿龍馬就駕明君御時和則隨從路平不邪邪道險阻傾危國家乾坤剛柔二者配合遞相包含則自然陽禀與而陰受蔵也盖陽雄則播施陰雌則含受孤陽不生孤陰不育雄雌二者相須精炁舒布以成造化如人受胎莫不以陰陽相交爲之造化故當以乾坤二卦爲始今云坎離冠首者盖乾坤爲天地坎離爲日月天地定位不能合而爲一而交於其中合而爲一者日月也故乾坤爲藥之體坎離爲藥之用所以只言坎離冠首者以明大藥之用全在坎離也是則乾坤爲鼎而坎離爲藥耳然坎離之用即於乾坤二體之間上下徃來飛潜不定豈易畫圖哉聖人欲揆度其玄妙以告學者惟觀六十襍卦之中陽畫陰爻或在上或在下玄冥難測但當如明君之御時而以六十卦爲輿泰然無爲以就駕則可晏然而順步徐徐而進道雍容和易穩路平驅自始至終周循諸卦安有險阻之患故曰和則隨從路平不邪苟不達此妄行邪徑則有顛覆之憂傾危之咎矣劉海蟾云莫教翻却紫河車與此意同盖言雖平夷須防險阻不可不謹也君子居其室出其言善則千里之外應之謂萬乘之主處九重之室發號出令順陰陽節蔵器伺時勿違卦月屯以子申蒙用寅戌餘六十卦各自有日修丹之士一年處室爲艱難所動雖小所感甚大如萬乘之君深居九重動止語默關係天和如易所謂君子居室應在千里正可爲比惟當順陰陽之降騰隨刑德而進止如懷至寳如護目睛如養胎兒如持滿器俟時之至不可違於卦月屯則自子至申蒙則自寅至戌其餘諸卦各自有時盖一日兩卦一時一爻欲識陰陽須分晝夜欲知晝夜須分黑白黑白旣分卦爻斯得易曰通乎晝夜之道而知者此也聊陳兩象未能究悉立義設刑當仁施德逆之者凶順之者吉按曆法令至誠專密謹候日夜審察消息纖芥不正悔吝爲賊兩象者屯蒙也未能究悉者不敢盡泄火候天機也學者遇師得㫖依時下手結就丹頭須當按乎曆法至誠專密謹候日夜審察消息遇陽則進如當仁而施德遇陰而退如立義而設刑順之則吉逆之則凶如其間毫髮不正則有悔吝存乎其間而爲賊害如苗中之草菜鏡中之塵垢且世人鍊丹砂猶恐水火差誤況兹金液大丹乎二至改度乖錯委曲隆冬大暑盛夏霜雪二分縱横不應漏刻風雨不節水旱相伐蝗蟲湧沸群異旁出天見其怪山崩地裂孝子用心感動皇極近出己口遠流殊域或以招禍或以致福或興太平或致兵革四者之中由乎胸臆二至者陰陽之始從出也苟乖錯其用則天變隨之夏雪冬雷灾異斯慘二分者陰陽之所交分也苟乖錯其用則天變亦然山崩地裂水旱爲灾不可勝言矣此蓋運火之士失時差誤而真胎損害世界崩摧孝子喻真胎皇極喻禍福或致太平或致兵革或以招禍或以致福皆由運火之士胸臆感召也鍊丹之法與世法無殊然治世之所感召猶如影響況奪天地之造化而與天地合其德同其運耶動靜有常舉其繩墨四時順宜與炁相得剛柔斷矣不相涉入五行守界不妄盈縮易行周流屈伸反覆火候禍福旣如前章則當動靜有常如循繩墨不可差四時之宜自然二氣相得剛不侵逾柔不退縮或屈或伸或反或覆五行周流各守疆界方可無虞也晦朔之間合符行中混沌鴻濛牝牡相從滋液澤潤施化流通天地神靈不可度量利用安身隱形而蔵始於東北箕斗之郷旋而右轉嘔輪吐萌潜潭見象散發精光至于晦朔之間則當合符行中如混沌鴻濛不可度量盖牝牡相從滋液潤澤施化流通之時也豈可用工乎故利用安身隱形而蔵却自箕斗之郷嘔輪吐萌發散輝光可也寒山子詩云不得露其根根虚則子墜盖體用不同施功亦異故也昴畢之上震出爲徵陽氣造端初九潜龍陽以三立陰以八通故三日震動八日兌行九二見龍和平有明三五德就乾體乃成九三夕惕虧折神符盛衰漸革終還其初巽繼其統固濟操持九四或躍進退道危艮主進止不得踰時二十三日典守弦期九五飛龍天位加喜六五坤承結括終始韞養衆子世爲類母陽數已訖訖則復起推情合性轉而相與魏君以一月之間月形圓缺喻卦象進退自初三日爲一陽初八日爲二陽十五則三陽全而乾體就十六則一陰生二十三則二陰生三十日則三陰全而坤體成昴畢在西方庚位如上卷所言震庚見西方之意亦同餘備述于前卷魏君重復言之欲學人深明體用耳循據璇璣升降上下周流六爻難可察覩故無常位爲易宗祖一日之間火候周旋如璇璣之運自子升上至午降下周歷六爻雖無形跡可觀而默運造化會之於心其時靈藥隨日徃來升降上下未嘗停止豈有常位所以與大易陽生陰降之理合也謂爲易宗祖者聖人先悟金丹之理以自修持超凡入聖而後述是理於易以示後人是知大易之作本諸大丹而大丹之道乃易之宗祖也朔旦爲復陽氣始通出入無疾立表微剛黄鍾建子兆乃滋彰播施柔暖黎烝得常半夜子時火候起緒也一陽未生火候未動衆陰群居如衆庶無統及乎火候旣動陽氣始通播施和暖烝𤋱鼎器光明旣兆則爲萬物發生之主是時修鍊之士便能默會進火之機以微剛爲表準出入徃來収放無疾自兹以徃漸漸增修以至純乾煆鍊成寳大凡初功尤冝加謹前輩詩云夜寒宜向火護衆到天明此即播施柔暖黎烝得常之義也臨爐施條開路正光光耀漸進日以益長丑之大吕結正低昂丑時進二陽火候也至是則光耀漸進開玄路正光明也陽自下生當就下結其時用功正低待過此一爻漸以放仰以隨化機故曰結正低昂仰以成泰剛柔並隆陰陽交接小徃大來輻凑於寅運而趨時寅時進三陽火候也至是則剛柔交分陰陽各半上水下火是則精水上騰神火下仰仰者欲升騰者欲降陰陽交接小徃大來造化輻凑於此漸歷大壯俠列卯門榆莢墮落還歸本根刑德相負晝夜始分卯時進四陽沐浴之候也其時晝夜始分生殺相半萬物至春敷榮而榆莢至是獨落盖榆筴應星星至曉隱以金丹與森羅萬象相參而萬象森羅亦生於日月故也夬陰以退陽升而前洗濯羽翮振索宿塵辰時進五陽火候也至是五陽上升水源清澄如禽出水振洗羽翼將欲奮飛爲沖天之舉矣乾徤明威廣被四鄰陽終於巳中而相干巳時進六陽火候也至是則純乾體就月圓水滿光盛神盈正而不偏圓而不缺光被四表明徧十方矣姤始紀緒履霜最先井底寒泉午主蕤賔賔服於陰陰爲主人午時退陰符候也至是則陰爲主而陽爲客苟不識主中賔賔中主則差之毫釐爲害不細勿以一陰方萌未能爲害奈何井底寒泉而履霜氷至前輩所以切切論主賔之分者以此遯去世位収歛其精懷德俟時棲遲昧明未時退二陰符候也否塞不通萌者不生陰伸陽屈没陽姓名申時退三陰符候也觀其權量察仲秋情任畜微稚老枯復榮薺麥芽蘖因冒以生酉時四陰沐浴候也薺麥應日故至八月芽蘖日魂胎於酉也木至是而胎蔵至是而沐浴故酉爲沐浴之候剥爛肢體消滅其形化炁旣竭亡失至神戌時退五陰符候也道窮則返歸乎坤元恒順地理承天布宣亥時退六陰符候也玄幽遠渺隔閡相連應度育種陰陽之源寥廓恍惚莫知其端先迷失軌後爲主君不平不陂道之自然變易更盛消息相因終坤始復如循連環帝王乘御千載尚存磁石吸鐵陽燧取火方諸取水皆陰陽相感隔礙相通之理豈能測其端倪哉修丹之功始若迷昩及乎火候旣終丹力旣熟方知身爲世尊如帝王之乘御矣此道豈外乎終坤始復之機哉魏君重復言之可謂明盡矣將欲養性延命却期審思後末當慮其先人所禀軀體本一無元精雲布因炁托初夫血氣之屬各有性而性未嘗不出於正也血氣之屬各有命而命未嘗不出於情也然性本正矣及乎迷失真性而淪溺於邪蹊甚至爲凶人爲蛇爲蝎爲異類變其性而爲邪性者有矣命本情矣及乎明心見性了知一切衆生各因淫欲而正斯命於是鍊精化炁入聖超凡變其命爲正命者有矣知性之本正然後能養知命之可正然後能延試思夫人之始初禀受形軀之時本一正性也而父母交精元炁雲布果出於正耶果出於情耶圓覺經謂命因慾有與此同㫖陰陽爲度魂魄所居陽神日魂陰神月魄互爲室宅性主處内立置鄞鄂情主營外築垣城郭城郭完全人民乃安爰斯之時情合坤乾乾動而直氣布精流坤靜而翕爲道舍廬剛施而退柔化以滋九還七返八歸六居男白女赤金火相拘則水定火五行之初上善若水清而無瑕道之形象真其難圖變而分布各自獨居夫情性生於魂魄魂魄生於明暗明暗生於日月日月生於陰陽聖人以乾坤剛柔動靜闔闢之機推測之此大丹之道所以契大易也其要不出乎以陰陽爲度也故日岀於卯則天明而魂盛日入於酉則天暗而魄盛魂爲陽神魄爲陰神魂以晝爲室魄以夜爲宅其實不岀乎明暗二機也夫人晝明則用魂用神而魂神本性也夜暗則歸精歸魄精魄本命也命生情故以精魄爲城郭性生心故存心爲鄞鄂城郭固全人物乃安當斯之時以情營外然後乾坤合而剛柔動靜闔闢之理得矣於是一運之氣周乎太空升降混淪俱化真土九金八木七火六水還返歸居皆入於土矣歸土則五行全而萬物生其中男現白形女呈赤貌盖五行聚會而金火相拘火鍊金而金櫃水如湯在鼎而玉鼎湯煎如鼎在爐而金爐火熾只言水金火者三物總在土中言火則自然有木造化旣成鉛凝汞結於鼎中則水之爲功又善之上者也至寳無瑕至真難摸火候旣足五行分布則又各自獨居而不相凌犯矣類如雞子黑白相扶縱廣一寸以爲始初四肢五臟筋骨乃俱彌歷十月脱出其胞骨弱可捲肉滑若鉛縱廣一寸横微狹焉法身在其中矣前輩有云爭如跳入珠光内踴身直到紫微宫陽燧以取火非日不生光方諸非星月安能得水漿二炁玄且遠感化尚相通何況近存身切在於心胸陰陽配日月水火爲效徵陽燧者鍊五色石作鏡向日以艾取火淮南子謂之火方諸又有水方諸以水晶爲珠向月取水又謂之陰燧陽燧方諸若不假日月則不能生水取火人身之中陰陽升降與天地造化同運其間水火交遇之理亦豈外夫日往月來交會之機以求證效哉耳目口三寳固塞勿發通真人潜深淵浮游守䂓中旋曲以視聽開闢皆合同爲己之樞轄動靜不竭窮離炁内營衞坎乃不用聦兊合不以談希言順鴻濛三者旣關鍵緩體處空房委志歸虚無無念以爲常證難以推移心專不縱横寢寐神相抱覺悟候存亡顔容浸以潤骨節益堅强排却衆陰邪然後立正陽脩之不輟休庶炁雲雨行淫淫若春澤液液象解冰從頭流達足究竟復上升徃來洞無極怫怫被容中反者道之驗弱者德之柄芸鉏宿污穢細微得調暢濁者清之路昏久則昭明耳不聽則坎水内澄目不視則離火内營口不言則兊金不鳴三者旣閉則真人優游其中須用無念無慮不可愁勞委志虚無心專不逸緩體處空房者無他意也盖欲人守雌抱一緩弱其體獨處空房之中寢寐則與神相抱覺悟則審候存亡然後排却陰邪純陽積聚一身之中太和充溢象解冰之液液如春澤之融融庶氣雲行如雨如霧上下往來從頭達足脩之不輟污穢盡除筋骨調暢顔容光澤骨節堅强血化白膏神形俱妙但七門旣返殆若亡生百脉俱沉形氣銷盡力弱不支昏濁如醉此乃道之驗德之柄也昏者明之基濁者清之源自兹已往圓明洞照虚徹靈通莫不自昏濁始也世人好小術不審道淺深棄正從邪徑欲速閼不通猶盲不任杖聾者聽宫商投水捕雉兔登山索魚龍植麥欲穫黍運䂓以求方竭力勞精神終年不見功欲知服食法事約而不繁世人棄正從邪嗜好小術徒勞心力至子無成焉知大道之妙至簡至易約而不繁者哉太陽流珠常欲去人卒得金華轉而相因化爲白液凝而至堅金華先唱有頃之間解化爲水馬齒琅玕陽乃往和情性自然迫促時陰拘畜禁門慈母養育孝子報恩嚴父施令教勑子孫五行錯王相據以生火性銷金金伐木榮三五與一天地至精可以口訣難以書傳人命在卯日出於卯而萬物仰之以生則是萬物皆借太陽之精以立命矣太陽流珠者命寳也其此命寳寓神則營營而亂思亂思則逐物而遷化矣寓精則持盈而難保難保則撓念而欲泄矣故曰常欲去人但世之知是理者鮮矣雖知之而能存者又鮮矣然太陽之寳本木魂之精若得金華而制伏之則化爲白液凝作黄芽如馬齒琅玕之狀拘畜酉門而成變化其法以五行吞啖之理如父驅子如子投母似母養育似子報恩故先用火銷金次用金伐木皆如嚴父之驅子然後化而爲水水者木之母也故曰母育復凝成金水者金之子自子變母故曰報恩要不出三五與一所謂三五一都三箇字古今明者實然稀苟不遇至人授之口訣豈可易以文字窺測天機也耶象彼仲冬節草木皆摧傷佐陽詰賈旅人君深自藏象時順節令閉口不用談天道甚浩廣太元無形容虚寂不可覩匡郭以消亡謬誤失事緒言還自敗傷别序斯四象以曉後生盲仲冬之節萬物歸根當斯之時造化難測觀夫天道則塞閉不通浩廣而難知察彼太玄則虚寂隱淪無形之可睹果何據而測造化之機耶魏君别序四象以示後來具于下章子當右轉午乃東旋卯酉界隔主定二名龍呼于虎虎吸龍精兩相飲食俱相貪榮遂相㘅嚥咀嚼相吞熒惑守西太白經天殺氣所臨何有不傾狸犬守䑕鳥雀畏鸇各得其功何敢有聲四象圖子從右轉來東卯午從東旋來西酉皆越九轉也如此則龍從火裏出虎向水中生熒惑守西而制金太白經天而晝見矣自然龍呼于虎虎吸龍精狸犬假虎威而制䑕鳥雀望日烏而畏鸇各得其功不敢出氣此皆五行相制之理不容不然者如此不得其理難以妄言竭殫家財妻子飢貧自古及今好者億人訖不諧遇希有能成廣求名藥與道乖殊如審遭逢睹其端緒以類相況揆物終始不得其理徒求外藥枉費資財一旦遭逢覩其端緒則能奪天地之化機揆萬物之終始矣五行相剋更爲父母母含滋液父生禀與凝精流形金石不朽審專不泄得爲成道立竿見影呼谷傳響豈不靈哉天地至象若以野葛一寸巴豆一兩入喉輙僵不得俛仰當此之時雖周文揲蓍孔子占象扁鵲摻鍼巫咸扣鼓安能令甦復起馳走夫人之命旣可使之速死亦可使之長生毒藥入口雖聖哲不能復甦刀圭下咽雖鬼神不能强害神靈之妙盡在虚明本五行變化之機實大造發生之體故立竿見影皆神火之靈明而呼谷聞聲亦神虚之應響金石難朽本出於虚無而鉛汞至靈實生於造化可謂恍惚中有物杳冥中有精非夫至神孰能而知之哉河上姹女靈而最神得火則飛不見埃塵鬼隱龍匿莫測所存將欲制之黄芽爲根北方正炁變爲姹女見火則飛騰出没隱匿無常若鍊就黄芽方能制伏如鬼子母入瑠璃鉢中神通無所施矣得吾道之高者自能知之物無陰陽違天背元牝雞自卵其雛不全夫何故乎配合未連三五不交剛柔離分施化之精天地自然猶火動而炎上水流而潤下非有師道使其然也資始統政不可復改觀夫雌雄交媾之時剛柔相結而不可解得其節符非有工巧以制御之若男生而伏女偃其軀禀乎胞胎受氣元初非徒生時著而見之及其死也亦復效之此非父母教令其然本在交媾定置始先張紫陽詩云莫把孤陰謂有陽獨修一物轉羸尪鍾離先生詩云莫謂此身云是道獨修一物是孤陰須知一陰一陽謂之道男女交精萬物化生而後可語還丹矣苟二物不合三五不交水火未濟剛柔離分則陰陽隔絶天地閉塞所謂偏陰偏陽謂之疾也坎男爲月離女爲日日以施德月以舒光月受日化體不虧傷陽失其契陰侵其明晦朔薄蝕掩冒相傾陽消其形陰凌災生男女相須含吐以滋雌雄錯襍以類相求天地所以能長久者以日月往來陰陽交會相資以發光輝一纔失度則有薄蝕之患人之坎離猶天地之日月也能以類盜天地之機乎金化爲水水性周章火化爲土水不得行故男動外施女靜内蔵溢度過節爲女所拘魄以鈴魂不得淫奢不寒不暑進退合時各得其利俱吐證符此言金水爲夫妻水火爲配耦之妙金生水水性温苟無土以制之則未免過溢之患木生火火生土土生而後水不得行拘收蔵蓄而與火爲配耦是則金木相剋得爲夫婦者假火之力也水火相剋而爲配耦者假土之力也然後進退合時各得其和而隨時變現俱吐符證矣丹砂木精得金乃并金水合處木火爲侣四者混沌列爲龍虎龍陽數奇虎陰數耦肝青爲父肺白爲母腎黑爲子脾黄爲祖子五行始三物一家都歸戊己金木甲庚相資爲用者彼此懷真土也金四與水一合化土五木三與火二合化土五雖東木之龍西金之虎東三西四奇耦不齊及乎分作三家合成一舍則都歸戊己矣剛柔迭興更歷分部龍西虎東建緯卯酉刑德並會相見歡喜刑主伏殺德主生起二月榆落魁臨於卯八月麥生天罡據酉子南午北互爲綱紀一九之數終而復始含元虚危播精於子自子至巳爲乾剛自午至亥爲坤柔識此迭興之理則自然龍西虎東子南午北建緯卯酉生起殺伏互爲綱紀各得時矣二月本生起而西酉臨之故榆死歸根八月本殺伏而東卯臨之故薺麥發生自西卯順行九轉然後見南方之子自東酉逆行九轉然後見北方虚危此一九之數含元虚危播精於子者此也關關雎鳩在河之洲窈窕淑女君子好逑雄不獨處雌不孤居玄武龜蛇蟠虬相扶以明牝牡竟當相須假使二女共室顔色甚殊令蘇秦通言張儀結媒發辯利舌奮舒美辭推心調諧合爲夫妻敝髮腐齒終不相知若藥物非種名類不同分劑參差失其紀綱雖黄帝臨爐太乙執火八公搗鍊淮南調合立宇崇壇玉爲階陛麟脯鳳腊把籍長跪禱祝神祇請哀諸鬼沐浴齋戒冀有所望亦猶和膠補釜以𥑪塗瘡去冷加冰除熱用湯飛龜舞蛇愈見乖張此言一陰一陽之謂道偏陰偏陽之謂疾苟得其配不勞餘力自然交遇以結聖胎苟不得其配則徒勞萬般枉費神思終不可得愈見乖張矣周易參同契解卷中
