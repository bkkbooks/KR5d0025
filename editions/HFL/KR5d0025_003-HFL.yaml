front:
  text: 周易參同契解卷下若三
  hash: sha256:340e21d701d5a20372234d448076735b457999c294058c9afa6866b18e1ff560
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0025_HFL_003-001a, image: hfl/0628/0628-120.png}
body:
  text: 抱一子陳顯微解下篇惟昔聖賢懷玄抱真服鍊九鼎化跡隱淪含精養神通德三光津液腠理筋骨緻堅衆邪辟除正氣長存累積長久變形而仙憂憫後生好道之倫隨傍風采指畫古文著爲圖籍開示後昆露見枝條隱蔵本根託號諸石覆謬衆文學者得之韞櫝終身子繼父業孫踵祖先舉世迷惑竟無見聞遂使宦者不仕農夫失耘商人棄財志士家貧吾甚傷之定録此文字約易思事省不繁披列其條核實可觀分兩有數因而相循故爲亂辭孔竅其門智者審思用意參焉魏君慮世人不達故又指古之聖賢懷玄抱真莫不服食九鼎通德三光故除邪存正化形而仙憂憫後生好道之流將仙經妄行箋註不惟自無見聞亦併與其子孫迷惑故甚傷之又述此篇法象莫大乎天地兮玄溝數萬里河鼓臨星紀兮人民皆驚駭晷影妄前却兮九年被凶咎皇上覽視之兮王者退自改關鍵有低昂兮害氣遂奔走江淮之枯竭兮水流注于海天地之雌雄兮徘徊子與午寅申陰陽祖兮出入復終始循斗而招摇兮執衡定元紀象法圖寅申陰陽岀入圖循斗圖升熬於甑山兮炎火張設下白虎唱道前兮蒼液和於後朱雀翺翔戲兮飛揚色五彩遭遇羅網施兮壓之不得舉嗷嗷聲甚悲兮嬰兒之慕母顛倒就湯鑊兮摧折傷毛羽漏刻未過半兮魚鱗狎獵起五色象炫燿兮變化無常主潏潏鼎沸馳兮暴湧不休止接連重疊累兮犬牙相錯距形如仲冬氷兮闌干吐鍾乳崔嵬而襍厠兮交積相支拄此叚魏君全彰玄關法象以示人也陰陽得其配兮淡泊而相守青龍處房六兮春華震東卯白虎在昂七兮秋芒兊西酉朱雀在張二兮正陰離南午三者俱來朝兮家屬爲親侣本之但二物兮末而爲三五三五之與一兮都集歸二所治之如上科兮日數亦取甫先白而後黄兮赤黑達表裏名曰第一鼎兮食如大黍米自然之所爲兮非有邪僞道若山澤炁相蒸兮興雲而爲雨泥竭遂成塵兮火滅化爲土若蘖染爲黄兮似藍成緑組皮革煑成膠兮麯蘖化爲酒同類易施功兮非種難爲巧惟斯之妙術兮審諦不誑語傳於億世後兮昭然自可考焕若星經漢兮昺如水宗海思之務令熟兮反覆視上下千周燦彬彬兮萬徧將可睹神明或告人兮心靈將自悟探端索其緒兮必得其門户天道無適莫兮常傳與賢者大丹九鼎者謂神丹大九轉之功也此乃無上至真超岀三界之上藥至於第一鼎之丹亦須小九轉之功足備方成黍米之狀此玄珠之象也其狀或白或黄或青或黑或赤初無定色又如真珠之狀古人謂摩尼寳珠常現五色又曰體似真珠狀丹砂本非赤皆親詣之語其他妄言形狀指畫千般自誑何益與其未識而妄言招譴曷若勤勤懇懇參師訪道必到親見之地然後立言亦未爲晚縱得之於身不立言何害魏君奉勸學者且熟讀是書千周萬徧至誠不怠或感神明告人或得心靈自悟自然探其端倪得其門户所謂天道無適無莫常傳與賢者是也愚嘗述立聖篇首篇云大道無私感即來神仙此語豈虚哉苟非著意求鉛汞爭悟天機脱聖胎亦此意也參同契者敷陳梗槩不得純一泛濫而說纖微未備闊畧彷彿今更撰録補塞遺脱潤色幽深鈎援相逮㫖意等齊所趣不背故復作此命五相類則大易之情性盡矣五位相得而各有合乙浮石丁文火己物辛世銀癸鉛三木二文火五土四金一水甲沉石丙武火戊藥庚世金壬汞大易情性各如其度黄老用究較而可御爐火之事真有所據三道由一俱出徑路大矣哉道之爲道也生育天地長養萬物造化不能逃聖人不能名伏羲由其度而作易黄老究其妙而得虚無自然之理爐火盜其機而得燒金乾汞之方是皆仰觀俯察遠取近用或寓於言或修於身或托於物事雖分三道則歸一也枝莖華葉果實垂布正在根株不失其素誠心所言審而不誤道不在言言猶枝莖華葉也因言會意意猶果實垂布也因意會道道猶根株也枝葉易見果實易知而根株則難見難知也言則易知意則易會而造道之妙者鮮矣然而根株雖隱發露於葉莖大道幽玄發明於言語況魏君誠心之言審而不誤在學者深造自得之耳會稽鄙夫幽谷朽生挾懷素朴不樂歡榮棲遲僻陋忽略利名抗守恬澹希時安平宴然閑居乃撰斯文歌敘太易三聖遺言察其㫖趣一統共論魏君生於東漢會稽上虞人也挾朴懷素忽略利名隱居學道潜默修真不知師授誰氏深造道玄得太乙火符金液九轉大還神丹之妙旣已利己又以利人乃撰斯文開示後學其功大矣其德盛矣而猶以鄙朽自牧至人謙晦如此哉此書與三聖所作太易意趣大統相合故命曰參同契云爾務在順理宣耀精神神化流通四海和平表以爲曆萬世可循序以御政行之不繁引内養性黄老自然含德之厚歸根返元近在我心不離己身抱一無舍可以長存配以服食雄雌設陳挺除武都八石棄捐審用成物世俗所珍讀是書者務在順太易相參之理近求諸已使其間所言神通變化之用歸之於精神心術之微則入神致用之妙得矣入神致用之妙得則仙道成矣豈惟學仙學道者賴是書哉序以御政則行不繁而四海平表以爲曆則神化通而萬世法引内養性則合黄老自然之道含歸眞返元之德配以服食則設雌雄制伏之事但世人不當認爲外藥耳苟認爲外藥則武都雄黄四神八石之類鍊而服之去道遠矣審其用而爲爐火之術則能鍊世銀而爲黄金乾水銀而爲白銀亦可爲世俗所珍也羅列三條枝莖相連同出異名皆由一門非徒累句諧偶斯文殆有其真礫硌可觀使予敷僞却被贅愆命參同契微覽其端辭寡意大後嗣宜遵委時去害依託丘山循逰寥廓與鬼爲鄰化形而仙淪寂無聲百世一下遨逰人間敷陳羽翮東西南傾堯湯厄際水旱隔并柯葉萎黄失其華榮吉人相乘負安穩可長生此書三篇大率首尾辭㫖相似魏君發明丹道再三敷敘重複其言者盖欲學者首尾相參易於曉會故其言謂此書三條皆枝莖相連其辭㫖雖取喻不同似出異路其實一門而已豈徒然諧偶累句以求美誦耶殆隱蔵至理礫硌可觀因命曰參同契者魏君自取是名也旣以是書示後世則魏君自是隱矣遂委時去害依山託跡形化而仙至於百世一下遨逰人間逰戲三界指示玄門濟度羣品則未嘗不敷陳羽翼借便於人也何異孔子十翼易經乎魏君豈一日忘天下乎然魏君之㫖則在乎使東木南火西金三物歸於一家如前篇三者俱來朝之義使人尋文會㫖也至於道成之後身外有身如吉人相乘負無徃而不自由雖堯之洪水湯之大旱萬物萎黄海變桑田而其一靈妙有乘真人法身徃來自如出入無礙可謂安穩獲長生矣鼎器歌圓三五鼎身周圍一尺五寸以象三五之數盖圍十五而徑五寸也三五者謂東三南二一五也中五二五也北一西四三五也本一太極之中而含三五之妙變五行爲三五變三五爲一金丹之妙盡於是矣故鼎器象焉寸一分厚一寸一分口四八四象八卦合之十二也鼎口周圍一尺二寸以象一日十二時循環十二位而不出鼎口之義也兩寸唇鼎唇厚二寸如兩層之狀象乾坤兩儀橐籥之形亦如人有重唇也長尺二鼎高一尺二寸象一年十二月表周年火候滿於一鼎自十一月鼎底陽生一寸至周歲則滿鼎矣厚薄均鼎上下厚薄均匀表安爐立鼎無偏頗不均之處腹齊三安置鼎器須要平正使鼎口齊鼎心鼎心齊鼎腹三者旣齊始無傾測之患坐垂温鼎象人身人象鼎使口齊心心齊腹如是而坐垂温者用火不必猛所謂温温鉛鼎是也陰在上陽下奔首尾武中間文進陽火則子丑寅爲首辰巳爲尾退陰符則午未申爲首戌亥爲尾首尾俱用武火至中宫沐浴則用文火也始七十終三旬始終百日之功聖胎已就也二百六善調均百日之後更須謹調二百六十日火候足成三百六十日滿一周年之功也陰火白黄芽鉛陰真君詩云火候遇陰爲太白是也陰黑也黑中用白陰中用陽也至寳得陰火方變作黄芽産於陰方黑鉛故也兩七聚輔翼人陰真君神室歌曰后土金鼎生死長七盖七者火之成數也所貴生界亦用七死界亦用七故曰生死長七於陰陽兩界用火不差則兩火聚而自然輔翼其中之真人矣瞻理腦定昇玄子處中得安存嬰兒在鼎戀玄而往天玄在上則嬰隨升愛護安存莫着外境欲知端的意北斗面南看來去逰不出門漸成大情性純閉固微密使無漏泄之虞則聖體漸大而情性愈純矣却歸一還本源聖胎旣就火侯旣終則歸一還源也至一周甚辛勤密防護莫迷昏一年火候甚是辛勤在修鍊之士尤宜密加防護惺惺不迷可也途路遠復幽玄前輩詩云一粒還丹大似拳時人服了便登仙莫教些子塵縁隔阻隔蓬萊路八千若達此會乾坤刀圭霑浄魄魂修真至此方能曉會乾坤之理而盜天地之化機日飲刀圭使魂靈魄聖也樂道者尋其根審五行定銖分是理不出乎五行苟好道參玄尋其根源審五行之細微定銖分之輕重則默而識之不待口傳而自悟解在學者專心致意精思入神而已諦思之不須論深蔵守莫傳文學道之士苟能因文悟解則必傳諸文字漏泄天機切在隱祕深蔵毋遺輕泄之譴御白鶴兮駕龍鱗逰太虚兮謁元君受天圖兮號真人成丹之後白鶴龍鱗在我神通自能變化非出於外來也世有不知修鍊積功累行可致神仙而妄想求真有晝夜翹思而待天詔者豈不謬哉至有爲鬼神所迷妖怪所惑化作龍輿鳳輦騰雲駕霧卒陷狐魅者多矣又豈知變化自我者爲正自外來者未始不出於邪怪也學者可不知之周易參同契解卷下參同契摘微竊爲賢者談曷敢輕爲書若遂結舌瘖絶道獲罪誅寫情著竹帛又恐泄天符猶豫增歎息俛仰綴斯愚陶冶有法度未忍悉陳敷畧述其綱紀枝條見扶踈以金爲隄防水入乃優游金計有十五水數亦如之臨爐定銖兩五分水有餘二者以爲真金重如本初其三遂不入火二與之俱三物旣合受變化狀若神下有太陽炁伏蒸須臾間先液而後凝號曰黄輿焉歲月將欲訖毁性傷壽年形體爲灰土狀若明牎塵余謂魏公玄要悉在此章彭真一陳抱一儲華谷三家議論不同中間寧無穿鑿其說皆失經意愚不自揣輙將師㫖率爲之註盖此章首尾次序收功證驗皆有法度故釋其義其餘諸章引明天道啓發人用俱可以心領而意會也矣以金爲隄防歌曰老君鍊丹無别藥惟有神室是金作盖將陽金鑄作神室隄防真汞飛走之故也水入乃優游此水非是金水之水乃是天元真一之水印真汞也旣將陽金鑄作神室隄防火毒無虞受鍊之際真一之水可以凝結成丹在於神室之中得自優游無諸散失也金計有十五水數亦如之金水共三十之數月之用也臨爐定銖兩銖是小分兩是大分進火受鍊之際當定輕重時吉時凶可進不可進也五分水有餘金水共三十之數作五分分之理合每有二分半六日爲一分至金華受鍊之日止用九也猶不及二分餘者皆水之分故言水有餘也二者以焉真五分之中止用二分自三日月出庚金方受生至上弦皆金生之日也色輕光淡月體未圓六日爲一分自初三至初九正當第二分也八日兌受丁十五乾體就至此丁甲用事所以超神接氣也又且金旺水秀正是兌金乾金二者受鍊之真候也金重如本初金數有十五前云知白守黑神明自來白者金精黑者水基大盡初二小盡初三黑圈中一㸃白起至十五乾金體就金數十五也後月繼前月體不減色不虧又云自開闢以來日月不虧明金不失其重可謂金重如本初月月如是修鍊者故得其用也其三遂不入自兌金鍊至乾金色足體滿十五乾體已就受鍊之極也一虧之後則五分之中二而已其三不入也三者皆水之分數也今鍊金不鍊水雖不言鍊水舉母子存分言之水則屬陰符故言其三遂不入也火二與之俱兌金乾金二者五分之中入火受鍊之日止用二分二金相與俱入火中受鍊矣則前五分有餘分而言之則陽火二陰符三故云其三遂不入火二與之俱也三物旣合受變化狀若神下有太陽炁伏蒸須臾間先液而後凝號曰黃輿焉歲月將欲訖毁性傷壽年形體爲灰土狀若明牎塵土金木三物相合滋育受太陽火炁薰蒸制伏於神室中先白後黃變化若神九年九易歳月將訖消毁凡胎炁性及有限壽年之陰質變體純陽壽同天永故云毀性傷壽年其形顯隱間狀若明牎塵參同契後敘丹經紫書行于世者多矣惟魏伯陽依金碧龍虎經託易象作參同契敷敘丹法最爲精詳吕真人之歌嘗曰金碧參同不計年妙中妙兮玄中玄高象先詩亦云金碧龍虎參同契留爲萬古丹中王盖美其至也越郡舊有彭真一註本僕曩得之玩讀無慮數過而辭深義隱邈不可窺扣諸江湖學仙之流亦莫不以是病祇嘆曰道淵乎哉歲在甲辰陽月下弦日天錫縁幸獲遇抱一先生陳君干山陰之大雲明年夏五圓日再遇於在所之佑聖觀先生且語僕曰子志於道更當爲道立功吾嘗徇友人之請作參同契解一編中所著辭率皆直指漏露丹祕曾無留機寔欲開後學㝠昧之途不敢爲古書幽深之語子能謀爲傳行計善行豈小哉僕旣受其書篝燈靜讀玄玄之妙朗在目前不惟魏君本㫖赫然彰明而諸經書所祕而不敢言者且昭揭于此矣即舉手讃曰吾先生可謂慈仁之至而是書可謂讀参同契者指南也敬募諸有縁相與而鋟之梓所冀逓相授受同志畢覽因文悟解立登真玄其或有未能盡悉淵微猶俟夫師之親指者則亦未免爲旁門邪徑殊術臆說似是而寔非者亂惑也後之覽者願加之意淳祐乙巳仲秋旦日門人天台稽首謹題又敘嘗聞先達高象先詩云金碧龍虎參同契留爲萬古丹中王又古今諸仙多尊參同契爲丹法之祖盖古有金碧龍虎經辭寡意深世人莫曉至漢魏君伯陽演經爲契魏君越之上虞人今越之公庫板行惟以彭曉箋義而爲善本然世代遷革今所行者已非彭真獨首敘與明鏡圖得魏君之㫖至於諸家之註皆以旁門附會故張平叔慨嘆世人將仙經妄行箋註者是也抱一先生陳君自淮㳺浙學者以是書質其真僞盖世之好異之士或以參同契爲僞書猶今所行麻衣之易也愚師事抱一先生最久親聞奥論謂魏君以伯陽自名實老氏之化身也而參同契辭章近古全述真機實魏君之言非常人所可擬述也猶麻衣之易實陳希夷記録麻衣之言非世儒可道而或者妄傳以爲己作惑誤後人是猶貪天之功豈不獲罪於天耶愚聞是語心融意釋因請抱一先生爲之註然而先生無心事事不可以筆硯凂愚時以一二叚求釋其㫖歲月旣久方成全編敬命梓工以傳同志噫金碧經待參同而始顯參同得先生解而始明是猶春秋之有左傳又得杜預爲之釋也上天憐愍學道者流生先生於斯世發明丹經之祕奥學者祕而傳諸毋貽輕泄漏慢之譴不勝至禱時端平改元正旦希微子王夷焚香再拜誓心敬跋周易參同契解卷下
